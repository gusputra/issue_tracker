<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Issue Tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1E3A8A',
            accent: '#2563EB',
          },
        },
      },
    };
  </script>
  <style>
    .fade-in {
      animation: fadeIn 0.8s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen font-sans flex flex-col">
  <div class="flex-1 flex flex-col items-center justify-center p-6 fade-in">
    {% block content %}{% endblock %}
  </div>

  <footer class="text-center text-gray-500 text-sm mt-6 pb-4">
    © {{ now().year }} Issue Tracker | Hotel Link Support ID
  </footer>
</body>
</html>
