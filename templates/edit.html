<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Issue | Issue Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">
  <!-- Navbar -->
  <nav class="bg-blue-700 text-white p-4 flex justify-between items-center shadow-md">
    <h1 class="text-xl font-bold">✏️ Edit Issue</h1>
    <div class="flex items-center space-x-4">
      <span class="text-sm bg-blue-800 px-3 py-1 rounded-full">
        👤 {{ username }} ({{ role }})
      </span>
      <a href="/recent" class="bg-blue-500 px-3 py-1 rounded hover:bg-blue-600 text-sm font-medium">Back</a>
      <a href="/logout" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 text-sm font-medium">Logout</a>
    </div>
  </nav>

  <!-- Edit Form -->
  <div class="max-w-3xl mx-auto bg-white mt-10 p-8 rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-blue-700 mb-6 text-center">🧾 Update Issue</h2>
    <form method="POST" action="/update/{{ issue.id }}" class="space-y-5">
      <div>
        <label class="font-semibold">🏨 Property Name</label>
        <input type="text" name="property_name" value="{{ issue.property_name }}" class="w-full p-3 border rounded-lg" required>
      </div>

      <div>
        <label class="font-semibold">📝 Description</label>
        <textarea name="description" rows="3" class="w-full p-3 border rounded-lg">{{ issue.description }}</textarea>
      </div>

      <div>
        <label class="font-semibold">🔘 Status</label>
        <select name="status" class="w-full p-3 border rounded-lg">
          <option value="Open" {% if issue.status == "Open" %}selected{% endif %}>Open</option>
          <option value="In Progress" {% if issue.status == "In Progress" %}selected{% endif %}>In Progress</option>
          <option value="Closed" {% if issue.status == "Closed" %}selected{% endif %}>Closed</option>
        </select>
      </div>

      <div>
        <label class="font-semibold">⚡ Priority</label>
        <select name="priority" class="w-full p-3 border rounded-lg">
          <option value="Low" {% if issue.priority == "Low" %}selected{% endif %}>Low</option>
          <option value="Medium" {% if issue.priority == "Medium" %}selected{% endif %}>Medium</option>
          <option value="High" {% if issue.priority == "High" %}selected{% endif %}>High</option>
        </select>
      </div>

      <div>
        <label class="font-semibold">🗒️ Notes</label>
        <textarea name="notes" rows="2" class="w-full p-3 border rounded-lg">{{ issue.notes }}</textarea>
      </div>

      {% if role == "admin" %}
      <div>
        <label class="font-semibold">👤 Handled By</label>
        <input type="text" name="handled_by" value="{{ issue.handled_by }}" class="w-full p-3 border rounded-lg">
      </div>
      {% endif %}

      <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-lg font-semibold hover:bg-blue-800 transition">💾 Save Changes</button>
    </form>
  </div>
</body>
</html>
